{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}{% block page_title %}{{ title }}{% endblock %}{% block topbar_actions %}<a href="{% url 'accounts:guarantor_list' %}" class="btn btn-secondary btn-sm">Back</a>{% endblock %}
{% block content %}<div class="card"><div class="card-body"><form method="post">{% csrf_token %}<div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><label>First Name</label><input name="first_name" required value="{{ guarantor.first_name|default:'' }}"></div><div><label>Last Name</label><input name="last_name" required value="{{ guarantor.last_name|default:'' }}"></div><div><label>Phone</label><input name="phone_primary" required value="{{ guarantor.phone_primary|default:'' }}"></div><div><label>NIN</label><input name="nin" value="{{ guarantor.nin|default:'' }}"></div><div><label>Type</label><select name="guarantor_type">{% for v,l in type_choices %}<option value="{{ v }}" {% if guarantor.guarantor_type == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select></div><div><label>District</label><input name="district" value="{{ guarantor.district|default:'Kampala' }}"></div><div><label>Monthly Income</label><input type="number" name="monthly_income" step="1" value="{{ guarantor.monthly_income|default:'0' }}"></div><div><label>Max Liability</label><input type="number" name="max_liability" step="1" value="{{ guarantor.max_liability|default:'0' }}"></div></div><div style="margin-top:14px"><label>Physical Address</label><textarea name="physical_address" rows="2" required>{{ guarantor.physical_address|default:'' }}</textarea></div><div style="margin-top:14px"><label>Notes</label><textarea name="notes" rows="2">{{ guarantor.notes|default:'' }}</textarea></div><label style="display:flex;gap:10px;margin-top:14px"><input type="checkbox" name="is_verified" {% if guarantor.is_verified %}checked{% endif %}> Verified</label><button class="btn btn-primary" style="margin-top:18px">Save Guarantor</button></form></div></div>{% endblock %}
