{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block topbar_actions %}<a href="{% url 'accounts:branch_list' %}" class="btn btn-secondary btn-sm">Back</a>{% endblock %}
{% block content %}
<div class="card"><div class="card-body"><form method="post">{% csrf_token %}<div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><label>Name</label><input name="name" required value="{{ branch.name|default:'' }}"></div><div><label>Code</label><input name="code" required value="{{ branch.code|default:'' }}"></div><div><label>Phone</label><input name="phone" value="{{ branch.phone|default:'' }}"></div><div><label>Email</label><input type="email" name="email" value="{{ branch.email|default:'' }}"></div><div><label>Manager</label><select name="manager"><option value="">Unassigned</option>{% for m in managers %}<option value="{{ m.pk }}" {% if branch.manager_id == m.pk %}selected{% endif %}>{{ m.full_name }}</option>{% endfor %}</select></div><div><label>Approval Limit</label><input type="number" name="approval_limit" step="1" value="{{ branch.approval_limit|default:'10000000' }}"></div></div><div style="margin-top:14px"><label>Address</label><textarea name="address" rows="3">{{ branch.address|default:'' }}</textarea></div><label style="display:flex;gap:10px;margin-top:14px"><input type="checkbox" name="is_active" {% if branch.is_active|default:True %}checked{% endif %}> Active</label><button class="btn btn-primary" style="margin-top:18px">Save Branch</button></form></div></div>
{% endblock %}
