<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password reset sent | Abacash</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/aba.css' %}">
  <style>
    body.login-page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top left, rgba(45, 212, 191, 0.14), transparent 24%),
                  radial-gradient(circle at bottom right, rgba(96, 165, 250, 0.16), transparent 28%),
                  var(--bg-base);
      color: var(--text-primary);
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
    }

    .auth-card {
      width: min(520px, 100%);
      padding: 36px;
      border-radius: 26px;
      background: rgba(6, 10, 18, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(2rem, 2.3vw, 2.6rem);
      color: #f8fafc;
    }

    p {
      margin: 0 0 18px;
      color: rgba(226, 232, 240, 0.82);
      line-height: 1.7;
    }

    .login-link {
      display: inline-block;
      margin-top: 8px;
      color: #a7f3d0;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body class="login-page">
  <div class="auth-card">
    <h1>Password reset email sent</h1>
    <p>If the email address exists, you will receive a password reset link shortly. Open the link and complete your administrator password setup.</p>
    <a class="login-link" href="/accounts/login/">Return to sign in</a>
  </div>
</body>
</html>
