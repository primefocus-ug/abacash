{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}{% block page_title %}{{ title }}{% endblock %}{% block topbar_actions %}<a href="{% url 'accounts:holiday_list' %}" class="btn btn-secondary btn-sm">Back</a>{% endblock %}
{% block content %}<div class="card"><div class="card-body"><form method="post">{% csrf_token %}<div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><label>Name</label><input name="name" required value="{{ holiday.name|default:'' }}"></div><div><label>Date</label><input type="date" name="date" required value="{{ holiday.date|date:'Y-m-d' }}"></div></div><div style="margin-top:14px"><label>Description</label><textarea name="description" rows="3">{{ holiday.description|default:'' }}</textarea></div><label style="display:flex;gap:10px;margin-top:14px"><input type="checkbox" name="is_recurring" {% if holiday.is_recurring %}checked{% endif %}> Recurring annually</label><label style="display:flex;gap:10px;margin-top:8px"><input type="checkbox" name="is_active" {% if holiday.is_active|default:True %}checked{% endif %}> Active</label><button class="btn btn-primary" style="margin-top:18px">Save Holiday</button></form></div></div>{% endblock %}
