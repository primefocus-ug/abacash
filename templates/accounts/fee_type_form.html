{% extends "base.html" %}
{% block title %}{{ title }}{% endblock %}{% block page_title %}{{ title }}{% endblock %}{% block topbar_actions %}<a href="{% url 'accounts:fee_type_list' %}" class="btn btn-secondary btn-sm">Back</a>{% endblock %}
{% block content %}<div class="card"><div class="card-body"><form method="post">{% csrf_token %}<div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:14px"><div><label>Name</label><input name="name" required value="{{ fee_type.name|default:'' }}"></div><div><label>Applies To</label><select name="applied_to">{% for v,l in applied_to_choices %}<option value="{{ v }}" {% if fee_type.applied_to == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select></div><div><label>Calculation</label><select name="calculation_method">{% for v,l in calculation_choices %}<option value="{{ v }}" {% if fee_type.calculation_method == v %}selected{% endif %}>{{ l }}</option>{% endfor %}</select></div><div><label>Amount</label><input type="number" name="amount" step="0.01" value="{{ fee_type.amount|default:'0' }}"></div><div><label>Min Amount</label><input type="number" name="min_amount" step="0.01" value="{{ fee_type.min_amount|default:'0' }}"></div><div><label>Max Amount</label><input type="number" name="max_amount" step="0.01" value="{{ fee_type.max_amount|default:'0' }}"></div></div><div style="margin-top:14px"><label>Description</label><textarea name="description" rows="3">{{ fee_type.description|default:'' }}</textarea></div><label style="display:flex;gap:10px;margin-top:14px"><input type="checkbox" name="is_mandatory" {% if fee_type.is_mandatory %}checked{% endif %}> Mandatory</label><label style="display:flex;gap:10px;margin-top:8px"><input type="checkbox" name="is_active" {% if fee_type.is_active|default:True %}checked{% endif %}> Active</label><button class="btn btn-primary" style="margin-top:18px">Save Fee Type</button></form></div></div>{% endblock %}
